name: 打包 Firefox 扩展

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: 打包 XPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 运行自动化测试
        run: npm test

      - name: 打包 XPI
        run: npm run package:xpi

      - name: 生成包信息
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./manifest.json').version")"
          XPI_URL="请把 dist/download-to-curl.xpi 发布到 Firefox 可访问的 HTTPS 或 file:/// 地址。"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            XPI_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/download-to-curl.xpi"
          fi

          {
            echo "扩展 ID: download-to-curl@example.local"
            echo "版本: ${VERSION}"
            echo "XPI 下载地址: ${XPI_URL}"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "Firefox ExtensionSettings 策略 install_url: ${XPI_URL}"
            fi
          } > dist/package-info.txt

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: download-to-curl-firefox-package
          path: |
            ./dist/download-to-curl.xpi
            ./dist/package-info.txt
          if-no-files-found: error

      - name: 发布到 GitHub 发布页
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Download to cURL Capture Firefox XPI"

          gh release upload "${GITHUB_REF_NAME}" \
            dist/download-to-curl.xpi \
            dist/package-info.txt \
            --clobber
